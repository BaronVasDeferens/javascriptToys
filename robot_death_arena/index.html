<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>HEX</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      /* centers vertically too */
      background-color: black;
    }

    #wrapper {
      border: 0px solid #5c5c5c;
      line-height: 0;
      /* kills the inline-canvas whitespace gap */
    }

    canvas {
      display: block;
      /* removes inline baseline gap at the source */
    }
  </style>
</head>

<body>
  <div id="wrapper">
    <canvas id="playArea" width="1024" height="800"></canvas>
  </div>
  <script src="rda.js" type="module"></script>
</body>

</html>
